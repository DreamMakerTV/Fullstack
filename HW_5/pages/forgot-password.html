<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Відновлення пароля - Rock Portal</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body style="background-color: #f4f5f7">
    <div class="auth-wrapper">
      <div class="auth-box">
        <a href="../index.html" class="auth-close">✕</a>

        <div class="auth-title">
          <strong>Відновлення пароля</strong>
        </div>
        <p class="auth-desc">
          Введіть ваш email, і ми надішлемо вам інструкції для відновлення
          пароля.
        </p>

        <form action="../index.html">
          <div class="form-group">
            <input
              type="email"
              placeholder="Введіть вашу email адресу"
              required
            />
          </div>

          <button type="submit" class="btn btn-green btn-block">
            Надіслати інструкції
          </button>
        </form>

        <div style="margin-top: 20px; font-size: 14px">
          <a href="login.html" style="color: #666; text-decoration: none"
            >← Повернутися до входу</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
