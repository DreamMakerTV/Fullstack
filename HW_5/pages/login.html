<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вхід - Rock Portal</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body style="background-color: #f4f5f7">
    <div class="auth-wrapper">
      <div class="auth-box">
        <a href="../index.html" class="auth-close">✕</a>

        <div class="auth-title">
          <strong>Вхід</strong>
          <span style="color: #ccc; margin: 0 10px">|</span>
          <a
            href="register.html"
            style="color: #ccc; text-decoration: none; font-weight: normal"
            >Реєстрація</a
          >
        </div>
        <p class="auth-desc">Введіть ваш email та пароль для входу.</p>

        <form action="../index.html">
          <div class="form-group">
            <input
              type="email"
              placeholder="Введіть вашу email адресу"
              required
            />
          </div>
          <div class="form-group">
            <input type="password" placeholder="Пароль" required />
          </div>

          <div class="auth-actions">
            <label> <input type="checkbox" /> Запам'ятати мене </label>
            <a href="forgot-password.html">Забули пароль?</a>
          </div>

          <button type="submit" class="btn btn-green btn-block">Вхід</button>
        </form>

        <div class="divider">Або увійдіть через</div>

        <button class="btn btn-outline btn-block">Продовжити з Google</button>
        <button class="btn btn-outline btn-block">Продовжити з Facebook</button>
      </div>
    </div>
  </body>
</html>
