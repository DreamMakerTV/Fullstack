<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>картина П'єта Мондріана</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="mondrian-canvas">
      <table class="mondrian-table">
        <colgroup>
          <col style="width: 12%" />
          <col style="width: 56%" />
          <col style="width: 22%" />
          <col style="width: 10%" />
        </colgroup>

        <tr class="row-1">
          <td class="white"></td>
          <td class="white"></td>
          <td class="yellow" colspan="2"></td>
        </tr>

        <tr class="row-2">
          <td class="white" rowspan="2"></td>
          <td class="red"></td>
          <td class="white"></td>
          <td class="white"></td>
        </tr>

        <tr class="row-3">
          <td class="black"></td>
          <td class="white" colspan="2"></td>
        </tr>

        <tr class="row-4">
          <td class="yellow"></td>
          <td class="white"></td>
          <td class="blue"></td>
          <td class="red"></td>
        </tr>
      </table>
    </div>
  </body>
</html>
